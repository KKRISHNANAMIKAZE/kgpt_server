name: kgpt_ui
description: K-GPT Flutter Web Interface
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  webview_flutter: ^4.0.0
  url_launcher: ^6.2.6

  # API
  http: ^1.6.0

  # File Upload
  file_picker: ^11.0.2

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.1.3

  # Browser User ID

  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/kombucha_bg.png
    - assets/kgpt_logo.png